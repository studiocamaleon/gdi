<svg width="677" height="369" viewBox="0 0 677 369" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gdi-cyan" x1="124" y1="57" x2="192" y2="153" gradientUnits="userSpaceOnUse">
      <stop stop-color="#28B8F2"/>
      <stop offset="1" stop-color="#1295D0"/>
    </linearGradient>
    <linearGradient id="gdi-magenta" x1="218" y1="56" x2="290" y2="151" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF0D96"/>
      <stop offset="1" stop-color="#DD007D"/>
    </linearGradient>
    <linearGradient id="gdi-yellow" x1="123" y1="151" x2="189" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF100"/>
      <stop offset="1" stop-color="#F5DD00"/>
    </linearGradient>
    <linearGradient id="gdi-black" x1="219" y1="153" x2="286" y2="247" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D1D1B"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <filter id="soft-shadow" x="92" y="28" width="232" height="254" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .core-bubbles {
      transform-origin: 200px 144px;
      transition: transform 320ms ease;
    }
    .core-bubble {
      transform-origin: center;
      transition: transform 320ms ease, opacity 320ms ease;
    }
    svg:hover .core-bubbles {
      animation: core-orbit 2.8s cubic-bezier(0.22, 1, 0.36, 1) infinite;
    }
    svg:hover .core-bubble {
      animation: core-pulse 2.8s ease-in-out infinite;
    }
    @keyframes core-orbit {
      0% { transform: rotate(0deg); }
      45% { transform: rotate(8deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes core-pulse {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }
  </style>

  <g filter="url(#soft-shadow)">
    <circle cx="152.5" cy="96.5" r="49.5" fill="url(#gdi-cyan)"/>
    <circle cx="247.5" cy="96.5" r="49.5" fill="url(#gdi-magenta)"/>
    <circle cx="152.5" cy="191.5" r="49.5" fill="url(#gdi-yellow)"/>
    <circle cx="247.5" cy="191.5" r="49.5" fill="url(#gdi-black)"/>

    <g class="core-bubbles">
      <circle class="core-bubble" cx="200" cy="96.5" r="16" fill="#5F5F78" fill-opacity="0.26"/>
      <circle class="core-bubble" cx="200" cy="191.5" r="16" fill="#5F5F78" fill-opacity="0.26"/>
      <circle class="core-bubble" cx="152.5" cy="144" r="16" fill="#5F5F78" fill-opacity="0.18"/>
      <circle class="core-bubble" cx="247.5" cy="144" r="16" fill="#5F5F78" fill-opacity="0.18"/>
      <circle class="core-bubble" cx="200" cy="144" r="20" fill="#4A4A57" fill-opacity="0.18"/>
    </g>
  </g>

  <g fill="#FAFAF8">
    <text
      x="332"
      y="161"
      font-family="Montserrat, Avenir Next, Poppins, Arial, sans-serif"
      font-size="126"
      font-weight="700"
      letter-spacing="0.5"
    >
      GDI
    </text>
    <text
      x="334"
      y="206"
      font-family="Montserrat, Avenir Next, Poppins, Arial, sans-serif"
      font-size="40"
      font-weight="500"
      letter-spacing="-0.2"
    >
      grafica digital
    </text>
    <text
      x="334"
      y="244"
      font-family="Montserrat, Avenir Next, Poppins, Arial, sans-serif"
      font-size="40"
      font-weight="500"
      letter-spacing="-0.2"
    >
      inteligente
    </text>
  </g>
</svg>
